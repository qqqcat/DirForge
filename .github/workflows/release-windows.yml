name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Override package version (defaults to tag name or Cargo.toml)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $override = '${{ github.event.inputs.version }}'
          if ($override) {
            $version = $override
          } elseif ('${{ github.ref_type }}' -eq 'tag' -and '${{ github.ref_name }}') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          } else {
            $manifest = Get-Content -Raw -Path 'Cargo.toml'
            if ($manifest -match '(?m)^version = "(?<version>[^"]+)"$') {
              $version = $Matches.version
            } else {
              throw 'Unable to resolve workspace version from Cargo.toml.'
            }
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Format check
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build release app
        run: cargo build --release -p dirotter-app

      - name: Sign Windows binary
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: |
          $timestamp = if ($env:WINDOWS_CODESIGN_TIMESTAMP_URL) { $env:WINDOWS_CODESIGN_TIMESTAMP_URL } else { 'http://timestamp.digicert.com' }
          ./scripts/sign-windows.ps1 -Files @('target/release/dirotter-app.exe') -TimestampUrl $timestamp

      - name: Package portable release
        id: package
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 -Version '${{ steps.version.outputs.version }}' -Configuration release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DirOtter-windows-x64-${{ steps.version.outputs.version }}
          path: |
            dist/*.zip
            dist/*.sha256.txt

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256.txt
